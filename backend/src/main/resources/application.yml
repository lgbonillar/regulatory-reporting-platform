spring:
  application:
    name: regulatory-reporting-api

  datasource:
    url: jdbc:postgresql://localhost:5432/regulatory_reporting
    username: regreporting
    password: regreporting
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  storage:
    upload-dir: ${APP_STORAGE_UPLOAD_DIR:storage/uploads}
    max-file-size-bytes: 10485760

server:
  port: 8080
