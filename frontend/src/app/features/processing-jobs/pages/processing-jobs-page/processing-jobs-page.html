<section class="flex w-full flex-col gap-6">
  <app-page-header eyebrow="Processing jobs" title="Job monitor">
    <div class="flex flex-col gap-2 sm:flex-row">
      <app-text-input
        placeholder="Filter by username"
        [compact]="true"
        [(value)]="filterUsername"
      />

      <app-button variant="primary" (click)="applyUsernameFilter()">
        Apply
      </app-button>

      <app-button variant="secondary" (click)="loadMyJobs()">
        Mine
      </app-button>

      <app-button variant="secondary" (click)="clearFilter()">
        All
      </app-button>
    </div>
  </app-page-header>

  @if (errorMessage()) {
    <app-alert type="error" [message]="errorMessage()!" />
  }

  <section class="grid gap-6 xl:grid-cols-[minmax(0,1fr)_380px]">
    <app-panel>
      <div class="relative flex items-center justify-between border-b border-slate-200 px-4 py-4 sm:px-6">
        <div class="flex items-center gap-3">
          <h2 class="text-base font-semibold text-slate-950">Jobs</h2>

          <span class="text-sm text-slate-500">
            {{ filteredJobs().length }} shown
          </span>

        </div>

        <div class="relative">
          <button
            class="inline-flex items-center gap-2 rounded-md border border-slate-300 bg-white px-3 py-2
            text-sm font-medium text-slate-700 transition hover:bg-slate-50"
            type="button"
            [attr.aria-expanded]="isStatusFilterOpen()"
            aria-controls="job-status-filters"
            (click)="toggleStatusFilterPanel()"
          >
            <svg
              class="size-4"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              aria-hidden="true"
            >
              <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3Z" />
            </svg>

            Filters

            @if (selectedStatusCount() > 0) {
              <span class="rounded-full bg-slate-900 px-2 py-0.5 text-xs text-white">
                {{ selectedStatusCount() }}
              </span>
            }
          </button>

          @if (isStatusFilterOpen()) {
            <div
              id="job-status-filters"
              class="absolute right-0 z-10 mt-2 w-72 rounded-lg border border-slate-200 bg-white p-3
              shadow-lg"
            >
              <div class="mb-3 flex items-center justify-between">
                <p class="text-sm font-semibold text-slate-900">Status</p>

                <button
                  class="text-sm font-medium text-slate-600 hover:text-slate-900"
                  type="button"
                  (click)="clearStatusFilters()"
                >
                  Clear
                </button>
              </div>

              <fieldset class="grid gap-2">
                <legend class="sr-only">Filter jobs by status</legend>

                @for (status of statusOptions; track status) {
                  <label class="flex cursor-pointer items-center gap-3 rounded-md px-2 py-2 hover:bg-slate-50">
                    <input
                      class="size-4 rounded border-slate-300"
                      type="checkbox"
                      [checked]="isStatusSelected(status)"
                      (change)="onStatusFilterChange($event, status)"
                    />

                    <app-status-badge [status]="status" />
                  </label>
                }
              </fieldset>
            </div>
          }
        </div>
      </div>

      @if (isLoading()) {

        <div class="p-6">
          <app-page-state
            type="loading"
            title="Loading jobs"
            message="Please wait while processing jobs are loaded."
          />
        </div>

      } @else if (filteredJobs().length > 0) {

        <app-processing-jobs-list
          [jobs]="filteredJobs()"
          [selectedJobId]="selectedJob()?.jobId ?? null"
          (jobSelected)="selectJob($event)"
        />

      } @else {

        <div class="p-6">
          <app-page-state
            type="empty"
            title="No processing jobs found"
            message="Try changing the filters or loading all jobs."
          />
        </div>

      }
    </app-panel>

    <app-processing-job-details-panel
      [job]="selectedJob()"
      [history]="selectedJobHistory()"
      [isHistoryLoading]="isHistoryLoading()"
      [historyErrorMessage]="historyErrorMessage()"
      [isActionRunning]="isActionRunning()"
      (startRequested)="startSelectedJob()"
      (approveRequested)="approveSelectedJob()"
      (rejectRequested)="rejectSelectedJob()"
      (revokeRequested)="revokeSelectedJob()"
    />
    </section>

</section>
