<section class="flex h-full min-h-0 w-full flex-col gap-6">
  <app-page-header eyebrow="Processing jobs" title="Job monitor">
    <div class="flex flex-col gap-2 sm:flex-row">
      <app-text-input
        placeholder="Filter by username"
        [compact]="true"
        [(value)]="store.filterUsername"
      />

      <app-button variant="primary" (click)="store.applyUsernameFilter()">
        Apply
      </app-button>

      <app-button variant="secondary" (click)="store.loadMyJobs()">
        Mine
      </app-button>

      <app-button variant="secondary" (click)="store.clearFilter()">
        All
      </app-button>

    </div>
  </app-page-header>

  @if (store.errorMessage()) {
    <app-alert type="error" [message]="store.errorMessage()!" />
  }

  <section class="min-h-0 flex-1">
    <app-panel [fullHeight]="true">
      <div class="flex h-full min-h-0 flex-col">
        <div class="relative flex shrink-0 flex-col gap-4 border-b border-slate-200 px-4 py-4 sm:px-6">
          <div class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
            <div class="flex items-center gap-3">
              <h2 class="text-base font-semibold text-slate-950">Jobs</h2>

              <span class="text-sm text-slate-500">
                {{ store.filteredJobs().length }} shown
              </span>
            </div>

            <div class="flex flex-wrap gap-2">
              <app-button variant="secondary" [disabled]="true">
                Export PDF
              </app-button>

              <app-button variant="secondary" [disabled]="true">
                Export Excel
              </app-button>
            </div>
          </div>

          <div class="grid gap-3 lg:grid-cols-[minmax(0,1fr)_minmax(0,1fr)_auto_minmax(10rem,12rem)_auto] lg:items-end">
            <div class="grid gap-1">
              <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">File</span>
              <app-text-input
                placeholder="Filter by file"
                ariaLabel="Filter jobs by file name"
                [compact]="false"
                [(value)]="store.filterFilename"
              />
            </div>

            <div class="grid gap-1">
              <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">User</span>
              <app-text-input
                placeholder="Filter by user"
                ariaLabel="Filter jobs by uploaded user"
                [compact]="false"
                [(value)]="store.filterUploadedBy"
              />
            </div>

            <div class="grid gap-1">
              <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Status</span>
              <app-processing-job-status-filter
                [statuses]="store.statusOptions"
                [selectedStatuses]="store.selectedStatuses()"
                [selectedCount]="store.selectedStatusCount()"
                [isOpen]="store.isStatusFilterOpen()"
                (toggleRequested)="store.toggleStatusFilterPanel()"
                (closeRequested)="store.closeStatusFilterPanel()"
                (clearRequested)="store.clearStatusFilters()"
                (statusChanged)="store.toggleStatusFilter($event.status, $event.checked)"
              />
            </div>

            <div class="grid gap-1">
              <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Created</span>
              <app-text-input
                type="date"
                ariaLabel="Filter jobs by creation date"
                [compact]="false"
                [(value)]="store.filterCreatedDate"
              />
            </div>

            <app-button variant="secondary" (click)="store.clearTableFilters()">
              Clear filters
            </app-button>

          </div>

        </div>

        <div class="min-h-0 flex-1 overflow-hidden">
          @if (store.isLoading()) {

            <div class="p-6">
              <app-page-state
                type="loading"
                title="Loading jobs"
                message="Please wait while processing jobs are loaded."
              />
            </div>

          } @else if (store.filteredJobs().length > 0) {

            <app-processing-jobs-list
              [jobs]="store.filteredJobs()"
              (jobSelected)="openJobDetails($event)"
            />

          } @else {

            <div class="p-6">
              <app-page-state
                type="empty"
                title="No processing jobs found"
                message="Try changing the filters or loading all jobs."
              />
            </div>

          }
        </div>
      </div>
    </app-panel>

  </section>

</section>
