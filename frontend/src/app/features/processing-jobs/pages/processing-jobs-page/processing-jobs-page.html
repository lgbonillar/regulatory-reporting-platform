<section class="flex w-full flex-col gap-6">
  <app-page-header eyebrow="Processing jobs" title="Job monitor">
    <div class="flex flex-col gap-2 sm:flex-row">
      <app-text-input
        placeholder="Filter by username"
        [compact]="true"
        [(value)]="filterUsername"
      />

      <app-button variant="primary" (click)="applyUsernameFilter()">
        Apply
      </app-button>

      <app-button variant="secondary" (click)="loadMyJobs()">
        Mine
      </app-button>

      <app-button variant="secondary" (click)="clearFilter()">
        All
      </app-button>
    </div>
  </app-page-header>

  @if (errorMessage()) {
    <app-alert type="error" [message]="errorMessage()!" />
  }

  <section class="grid gap-6 xl:grid-cols-[minmax(0,1fr)_380px]">
    <app-panel>
      <div class="relative flex items-center justify-between border-b border-slate-200 px-4 py-4 sm:px-6">
        <div class="flex items-center gap-3">
          <h2 class="text-base font-semibold text-slate-950">Jobs</h2>

          <span class="text-sm text-slate-500">
            {{ filteredJobs().length }} shown
          </span>

        </div>

        <app-processing-job-status-filter
          [statuses]="statusOptions"
          [selectedStatuses]="selectedStatuses()"
          [selectedCount]="selectedStatusCount()"
          [isOpen]="isStatusFilterOpen()"
          (toggleRequested)="toggleStatusFilterPanel()"
          (clearRequested)="clearStatusFilters()"
          (statusChanged)="toggleStatusFilter($event.status, $event.checked)"
        />

      </div>

      @if (isLoading()) {

        <div class="p-6">
          <app-page-state
            type="loading"
            title="Loading jobs"
            message="Please wait while processing jobs are loaded."
          />
        </div>

      } @else if (filteredJobs().length > 0) {

        <app-processing-jobs-list
          [jobs]="filteredJobs()"
          [selectedJobId]="selectedJob()?.jobId ?? null"
          (jobSelected)="selectJob($event)"
        />

      } @else {

        <div class="p-6">
          <app-page-state
            type="empty"
            title="No processing jobs found"
            message="Try changing the filters or loading all jobs."
          />
        </div>

      }
    </app-panel>

    <app-processing-job-details-panel
      [job]="selectedJob()"
      [history]="selectedJobHistory()"
      [isHistoryLoading]="isHistoryLoading()"
      [historyErrorMessage]="historyErrorMessage()"
      [isActionRunning]="isActionRunning()"
      (startRequested)="startSelectedJob()"
      (approveRequested)="approveSelectedJob()"
      (rejectRequested)="rejectSelectedJob()"
      (revokeRequested)="revokeSelectedJob()"
    />
  </section>

</section>
