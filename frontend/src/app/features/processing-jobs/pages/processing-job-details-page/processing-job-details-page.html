<section class="flex h-full min-h-0 w-full flex-col gap-6">
  <app-page-header eyebrow="Processing job" title="Job details">
    <a
      routerLink="/processing-jobs"
      class="inline-flex items-center text-sm font-medium text-slate-600 underline decoration-slate-300 underline-offset-4 transition hover:text-slate-950 hover:decoration-slate-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-300"
    >
      ← Back to processes
    </a>
  </app-page-header>

  @if (store.errorMessage()) {
    <app-alert type="error" [message]="store.errorMessage()!" />
  }

  @if (store.isLoading()) {
    <app-page-state
      type="loading"
      title="Loading job"
      message="Please wait while the processing job is loaded."
    />
  } @else {
    <section class="grid min-h-0 flex-1 gap-6 overflow-hidden xl:grid-cols-[minmax(0,1fr)_minmax(0,1fr)]">
      <div class="min-h-0">
        <app-processing-job-details-panel
          [job]="store.job()"
          [isActionRunning]="store.isActionRunning()"
          (startRequested)="store.startSelectedJob()"
          (approveRequested)="store.approveSelectedJob()"
          (rejectRequested)="requestReject()"
          (revokeRequested)="requestRevoke()"
        />
      </div>

      <div class="min-h-0 overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm">
        <app-processing-job-history-list
          [history]="store.history()"
          [isLoading]="store.isHistoryLoading()"
          [errorMessage]="store.historyErrorMessage()"
        />
      </div>
    </section>
  }

  <app-confirmation-dialog
    [isOpen]="pendingConfirmation() === 'reject'"
    title="Reject process"
    message="This will reject the processed result. Add the reason so the decision is traceable."
    confirmLabel="Reject"
    confirmVariant="warning"
    [requiresReason]="true"
    reasonLabel="Rejection reason"
    reasonPlaceholder="Explain why this process is being rejected."
    [isSubmitting]="store.isActionRunning()"
    (cancelRequested)="closeConfirmation()"
    (confirmRequested)="confirmAction($event)"
  />

  <app-confirmation-dialog
    [isOpen]="pendingConfirmation() === 'revoke'"
    title="Revoke approval"
    message="This will invalidate a previous approval. Add the reason so the decision is traceable."
    confirmLabel="Revoke"
    confirmVariant="secondary"
    [requiresReason]="true"
    reasonLabel="Revocation reason"
    reasonPlaceholder="Explain why this approval is being revoked."
    [isSubmitting]="store.isActionRunning()"
    (cancelRequested)="closeConfirmation()"
    (confirmRequested)="confirmAction($event)"
  />
</section>
