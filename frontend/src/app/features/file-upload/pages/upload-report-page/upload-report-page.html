<section class="flex w-full flex-col gap-6">
  <app-page-header eyebrow="Report files" title="Uploaded Excel files">
    <p class="text-sm text-slate-500">
      User:
      <span class="font-medium text-slate-800">{{ username() }}</span>
    </p>
  </app-page-header>

  <app-panel padding="normal">
    <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
      <div class="flex-1">
        <label class="block text-sm font-medium text-slate-700" for="report-file">
          Upload report file
        </label>

        <div class="mt-2 flex flex-col gap-3 sm:flex-row sm:items-center">
          <input
            id="report-file"
            class="block w-full rounded-md border border-slate-300 bg-white text-sm text-slate-700 file:mr-4 file:border-0 file:bg-slate-900 file:px-4 file:py-2 file:text-sm file:font-medium file:text-white hover:file:bg-slate-700"
            type="file"
            accept=".xlsx"
            (change)="onFileSelected($event)"
          />

          <app-button
            variant="primary"
            [loading]="isUploading()"
            [disabled]="isUploading()"
            (click)="uploadSelectedFile()"
          >
            Upload
          </app-button>
        </div>

        @if (selectedFileSummary()) {
          <p class="mt-2 text-sm text-slate-500">{{ selectedFileSummary() }}</p>
        }
      </div>
    </div>
  </app-panel>

  @if (errorMessage()) {
    <app-alert type="error" [message]="errorMessage()!" />
  }

  @if (successMessage()) {
    <app-alert type="success" [message]="successMessage()!" />
  }

  <app-panel>
    <div class="flex flex-col gap-2 border-b border-slate-200 px-4 py-4 sm:flex-row sm:items-center sm:justify-between sm:px-6">
      <div>
        <h2 class="text-base font-semibold text-slate-950">Files</h2>
        <p class="text-sm text-slate-500">Stored reports for {{ username() }}</p>
      </div>
    </div>

    @if (isLoadingFiles()) {

      <div class="p-6">
        <app-page-state
          type="loading"
          title="Loading files"
          message="Please wait while the report files are loaded."
        />
      </div>

    } @else if (hasFiles()) {

      <app-uploaded-files-list
        [files]="files()"
        [actionFileId]="actionFileId()"
        (replacementSelected)="onReplacementFileSelected($event.event, $event.fileId)"
        (deleteSelected)="deleteReportFile($event)"
      />

    } @else {

      <div class="p-6">
        <app-page-state
          type="empty"
          title="No files uploaded"
          message="Upload an Excel file to start a processing flow."
        />
      </div>
      
    }
  </app-panel>
</section>
