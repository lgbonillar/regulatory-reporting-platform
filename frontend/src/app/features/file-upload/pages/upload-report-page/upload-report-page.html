<section class="flex h-full min-h-0 w-full flex-col gap-4">
  <app-breadcrumb [items]="[{ label: 'report-files', route: '/report-files/upload' }]" />

  <app-page-header title="Uploaded Excel files" />

  @if (store.errorMessage()) {
    <app-alert type="error" [message]="store.errorMessage()!" />
  }

  <div class="min-h-0 flex-1">
    <app-panel [fullHeight]="true">
      <div class="flex h-full min-h-0 flex-col">
        <div class="flex shrink-0 flex-col gap-3 border-b border-slate-200 px-4 py-4 sm:flex-row sm:items-center sm:justify-between sm:px-6">
          <div>
            <h2 class="text-base font-semibold text-slate-950">Files</h2>
            <p class="text-sm text-slate-500">Stored report files.</p>
          </div>

          <div class="flex flex-wrap items-center gap-2">
            <app-report-file-upload-control
              [compact]="true"
              [selectedFileSummary]="store.selectedFileSummary()"
              [isUploading]="store.isUploading()"
              (fileSelected)="onFileSelected($event)"
            />

            <app-table-export-menu />
          </div>
        </div>

        <div class="min-h-0 flex-1 overflow-hidden">
          @if (store.isLoadingFiles()) {

            <div class="p-6">
              <app-page-state
                type="loading"
                title="Loading files"
                message="Please wait while the report files are loaded."
              />
            </div>

          } @else if (store.hasFiles()) {

            <app-uploaded-files-list
              [files]="store.files()"
              [actionFileId]="store.actionFileId()"
              (replacementSelected)="onReplacementFileSelected($event.file, $event.fileId)"
              (deleteSelected)="requestDeleteReportFile($event)"
            />

          } @else {

            <div class="p-6">
              <app-page-state
                type="empty"
                title="No files uploaded"
                message="Upload an Excel file to start a processing flow."
              />
            </div>

          }
        </div>
      </div>
    </app-panel>
  </div>

  <app-confirmation-dialog
    [isOpen]="pendingDeleteFileId() !== null"
    title="Delete file"
    message="This file will no longer be available for processing. This action cannot be undone."
    confirmLabel="Delete"
    confirmVariant="danger"
    [isSubmitting]="store.actionFileId() !== null"
    (cancelRequested)="cancelDeleteReportFile()"
    (confirmRequested)="confirmDeleteReportFile()"
  />
</section>
