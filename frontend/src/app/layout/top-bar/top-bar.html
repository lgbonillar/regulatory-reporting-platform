<header
    class="fixed right-0 top-0 z-20 flex h-16 items-center justify-between border-b border-slate-200 bg-white px-6 shadow-sm transition-all duration-200"
    [class.left-20]="isSidebarCollapsed()"
    [class.left-72]="!isSidebarCollapsed()"
  >
    <div>
      <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">
        Regulatory reporting platform
      </p>
      <h1 class="text-lg font-semibold text-slate-950">
        {{ activePageTitle() }}
      </h1>
    </div>

    <div class="text-right">
      <p class="text-sm font-semibold text-slate-900">
        {{ currentUser().displayName }}
      </p>
      <p class="text-xs text-slate-500">
        {{ currentUser().role }}
      </p>
    </div>
  </header>
