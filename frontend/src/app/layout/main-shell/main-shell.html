<div class="min-h-dvh bg-slate-100 text-slate-900">
  <app-side-nav
    [items]="navigationService.navigationItems()"
    [isCollapsed]="isSidebarCollapsed()"
    (toggleCollapsed)="toggleSidebar()"
  />

  <app-top-bar
    [activePageTitle]="navigationService.activePageTitle()"
    [currentUser]="sessionService.currentUser()"
    [isSidebarCollapsed]="isSidebarCollapsed()"
    (mockRoleChanged)="setMockRole($event)"
  />

  <main
    class="min-h-dvh pt-16 transition-all duration-200"
    [class.pl-20]="isSidebarCollapsed()"
    [class.pl-72]="!isSidebarCollapsed()"
  >
    <div class="mx-auto w-full max-w-7xl px-6 py-6">
      <router-outlet />
    </div>
  </main>
</div>
