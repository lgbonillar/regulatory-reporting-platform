services:
  postgres:
    image: postgres:16
    container_name: regulatory-reporting-postgres
    environment:
      POSTGRES_DB: regulatory_reporting
      POSTGRES_USER: regreporting
      POSTGRES_PASSWORD: regreporting
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: